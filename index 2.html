<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Kane Driver PRO</title>
  <style>
    :root{--bg:#07111f;--card:#111c2f;--line:#2b3b58;--text:#f8fafc;--muted:#9fb0ca;--gold:#f4c84a;--green:#16a34a;--red:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(180deg,#061022,#0b1324);color:var(--text);padding-bottom:92px}.app{max-width:520px;margin:0 auto;padding:18px}.hero{background:linear-gradient(135deg,#2a3038,#101827);border:1px solid #39465f;border-radius:28px;padding:22px;box-shadow:0 12px 35px rgba(0,0,0,.25)}.brand{display:flex;gap:14px;align-items:center}.logo{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,#ffe27a,#eab308);color:#111827;font-weight:900;font-size:26px;display:grid;place-items:center}h1{font-size:28px;margin:0}.sub{color:#f7d978;margin-top:6px}.total{display:flex;justify-content:space-between;align-items:end;border-top:1px solid #455169;margin-top:18px;padding-top:16px}.price{font-size:42px;font-weight:900}.card{background:rgba(17,28,47,.92);border:1px solid var(--line);border-radius:24px;padding:18px;margin-top:16px}.title{font-size:22px;font-weight:850;margin:0 0 14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}label{display:block;color:var(--muted);font-size:14px;margin:8px 0 7px}input,select,textarea{width:100%;background:#081225;color:var(--text);border:1px solid #2b3b58;border-radius:17px;padding:15px;font-size:17px;outline:none}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tab{border:1px solid #334563;background:#0b1629;color:var(--text);padding:14px 10px;border-radius:18px;font-weight:800;font-size:15px}.tab.active{background:var(--gold);color:#111827;border-color:var(--gold)}.seg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.seg button{padding:14px;border-radius:16px;border:1px solid #354762;background:#0b1629;color:#fff;font-weight:800}.seg button.active{background:#1d4ed8}.note{font-size:13px;color:var(--muted);line-height:1.45}.breakdown{white-space:pre-line;background:#081225;border:1px solid #2b3b58;border-radius:18px;padding:14px;color:#dbeafe;line-height:1.6}.bottom{position:fixed;left:0;right:0;bottom:0;background:#050b14cc;backdrop-filter:blur(14px);border-top:1px solid #23314b;padding:12px 14px;display:flex;gap:10px;justify-content:center}.bottom button{border:0;border-radius:18px;padding:16px 18px;font-size:17px;font-weight:900}.calc{background:var(--gold);color:#111827}.copy{background:var(--green);color:#fff}.save{background:#243858;color:#fff}.hide{display:none!important}.pill{display:inline-block;background:#102646;border:1px solid #2c4b78;color:#bfdbfe;padding:6px 10px;border-radius:99px;font-size:13px;margin:3px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center}.smallbtn{padding:10px 12px;border-radius:13px;border:1px solid #334563;background:#0b1629;color:#fff;font-weight:800}
  </style>
</head>
<body>
<div class="app">
  <section class="hero"><div class="brand"><div class="logo">KD</div><div><h1>Kane Driver PRO</h1><div class="sub">Build 001 · Toyota Vios G 2022</div></div></div><div class="total"><div><div class="note">Tổng báo giá</div><div id="summaryText" class="note">Sẵn sàng tính giá</div></div><div id="totalPrice" class="price">0đ</div></div></section>
  <section class="card"><div class="title">➕ Báo giá mới</div><label>Loại chuyến</label><div class="tabs"><button class="tab active" data-trip="city">🚗 Nội thành</button><button class="tab" data-trip="province">🛣 Liên tỉnh</button><button class="tab" data-trip="hourly">⏱ Theo giờ</button><button class="tab" data-trip="daily">📅 Theo ngày</button></div>
    <div class="grid" style="margin-top:12px"><div><label>Tên khách</label><input id="customer" placeholder="VD: Anh Nam"></div><div><label>Số điện thoại</label><input id="phone" placeholder="09..."></div><div class="full"><label>Điểm đón</label><input id="from" placeholder="Lê Thành Tân Tạo"></div><div class="full"><label>Điểm đến</label><input id="to" placeholder="Sân bay / nhà hàng / Vũng Tàu"></div><div><label>Ngày đi</label><input id="date" type="date"></div><div><label>Giờ đi</label><input id="startTime" type="time" value="08:00"></div><div><label>Quãng đường 1 chiều (km)</label><input id="km" type="number" value="16" min="0"></div><div id="returnTimeBox" class="hide"><label>Giờ đón về / trả thực tế</label><input id="returnTime" type="time" value="18:00"></div></div>
    <div id="cityOptions" style="margin-top:14px"><label>Hình thức nội thành</label><div class="seg"><button id="cityOne" class="active">Một chiều</button><button id="cityWait">Đưa đi - chờ - về</button></div></div>
    <div id="provinceOptions" class="hide" style="margin-top:14px"><label>Hình thức liên tỉnh</label><div class="seg"><button id="proOne" class="active">Một chiều</button><button id="proRound">Hai chiều</button></div><div id="emptyReturnBox"><label>Xe quay về rỗng?</label><select id="emptyReturn"><option value="no">Không</option><option value="yes">Có</option></select></div><div id="daysBox" class="hide"><label>Gói phục vụ</label><select id="days"><option value="1">1 ngày · 12 giờ / 300km</option><option value="2">2 ngày · 24 giờ / 600km</option><option value="3">3 ngày · 36 giờ / 900km</option></select></div></div>
    <div id="hourlyOptions" class="hide" style="margin-top:14px"><label>Gói theo giờ</label><select id="hourPackage"><option value="2">2 giờ · 30km</option><option value="4">4 giờ · 60km</option><option value="8">8 giờ · 120km</option><option value="12">12 giờ · 200km</option></select></div>
    <div id="dailyOptions" class="hide" style="margin-top:14px"><label>Gói theo ngày</label><select id="dayPackage"><option value="1">1 ngày · 12 giờ / 300km</option><option value="2">2 ngày · 24 giờ / 600km</option><option value="3">3 ngày · 36 giờ / 900km</option></select></div>
  </section>
  <section class="card"><div class="title">💰 Phụ phí</div><div class="grid"><div><label>Cao tốc</label><input id="toll" type="number" value="0"></div><div><label>Bãi xe</label><input id="parking" type="number" value="0"></div><div><label>Phà / phí khác</label><input id="otherFee" type="number" value="0"></div><div><label>Giảm giá</label><input id="discount" type="number" value="0"></div><div><label>Đặt cọc</label><input id="deposit" type="number" value="0"></div><div><label>Ngày lễ?</label><select id="holiday"><option value="no">Không</option><option value="yes">Có +30%</option></select></div></div><p class="note">Phụ phí đêm 22:00–05:00 tự cộng +20%. Cao tốc, bãi xe, phà nhập theo thực tế.</p></section>
  <section class="card"><div class="row"><div class="title">📋 Kết quả</div><button class="smallbtn" onclick="clearHistory()">Xóa lịch sử</button></div><div id="breakdown" class="breakdown">Bấm “Tính giá” để xem chi tiết.</div></section>
  <section class="card"><div class="title">🕘 Lịch sử</div><div id="history" class="note">Chưa có báo giá nào.</div></section>
</div>
<div class="bottom"><button class="calc" onclick="calculate()">Tính giá</button><button class="copy" onclick="copyZalo()">Copy Zalo</button><button class="save" onclick="saveQuote()">Lưu</button></div>
<script>
const cfg={minCity:300000,cityOver50:12000,provinceKm:12000,roundFactor:1.75,emptyFactor:2,nightPct:.2,holidayPct:.3,waitFree:0,waitHour:100000,overKm:10000,overHour:100000,hourly:{2:{price:500000,km:30},4:{price:800000,km:60},8:{price:1300000,km:120},12:{price:1800000,km:200}},daily:{1:{price:2500000,hours:12,km:300},2:{price:4800000,hours:24,km:600},3:{price:6900000,hours:36,km:900}}};
let state={trip:'city',cityMode:'one',provinceMode:'one',last:null};const $=id=>document.getElementById(id),money=n=>Math.round(n).toLocaleString('vi-VN')+'đ',num=id=>Number($(id).value||0);function today(){let d=new Date();$('date').value=d.toISOString().slice(0,10)}today();document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.trip=b.dataset.trip;render()});cityOne.onclick=()=>{state.cityMode='one';cityOne.classList.add('active');cityWait.classList.remove('active');render()};cityWait.onclick=()=>{state.cityMode='wait';cityWait.classList.add('active');cityOne.classList.remove('active');render()};proOne.onclick=()=>{state.provinceMode='one';proOne.classList.add('active');proRound.classList.remove('active');render()};proRound.onclick=()=>{state.provinceMode='round';proRound.classList.add('active');proOne.classList.remove('active');render()};function show(id,v){$(id).classList.toggle('hide',!v)}function render(){show('cityOptions',state.trip==='city');show('provinceOptions',state.trip==='province');show('hourlyOptions',state.trip==='hourly');show('dailyOptions',state.trip==='daily');show('returnTimeBox',(state.trip==='city'&&state.cityMode==='wait')||state.trip==='hourly'||state.trip==='daily'||(state.trip==='province'&&state.provinceMode==='round'));show('emptyReturnBox',state.trip==='province'&&state.provinceMode==='one');show('daysBox',state.trip==='province'&&state.provinceMode==='round')}function minutes(t){let [h,m]=(t||'00:00').split(':').map(Number);return h*60+m}function diffHours(a,b){let x=minutes(a),y=minutes(b);if(y<x)y+=1440;return Math.max(0,(y-x)/60)}function isNight(t){let m=minutes(t);return m>=1320||m<300}function cityBase(km){if(km<=20)return cfg.minCity;if(km<=30)return 350000;if(km<=40)return 450000;if(km<=50)return 550000;return 550000+(km-50)*cfg.cityOver50}
function calculate(){let km=num('km'),base=0,lines=[],hours=0,overKm=0,overHours=0,start=$('startTime').value;if(state.trip==='city'){base=cityBase(km);lines.push('Nội thành: '+money(base));if(state.cityMode==='wait'){hours=diffHours(start,$('returnTime').value);let wait=Math.max(0,hours-cfg.waitFree)*cfg.waitHour;base+=wait;lines.push('Chờ '+hours.toFixed(1)+' giờ: '+money(wait))}}if(state.trip==='province'){base=km*cfg.provinceKm;lines.push('Liên tỉnh 1 chiều: '+km+'km × '+money(cfg.provinceKm)+' = '+money(base));if(state.provinceMode==='one'&&$('emptyReturn').value==='yes'){base*=cfg.emptyFactor;lines.push('Xe quay về rỗng ×'+cfg.emptyFactor)}if(state.provinceMode==='round'){base*=cfg.roundFactor;let d=Number($('days').value),freeH=cfg.daily[d].hours,freeKm=cfg.daily[d].km;overKm=Math.max(0,km*2-freeKm);overHours=Math.max(0,diffHours(start,$('returnTime').value)-freeH);let extra=overKm*cfg.overKm+overHours*cfg.overHour;base+=extra;lines.push('Hai chiều ×'+cfg.roundFactor);lines.push('Gói '+d+' ngày: '+freeH+' giờ / '+freeKm+'km');lines.push('Vượt: '+overKm+'km, '+overHours.toFixed(1)+' giờ = '+money(extra))}}if(state.trip==='hourly'){let p=cfg.hourly[$('hourPackage').value];base=p.price;hours=diffHours(start,$('returnTime').value);overKm=Math.max(0,km-p.km);overHours=Math.max(0,hours-Number($('hourPackage').value));let extra=overKm*cfg.overKm+overHours*cfg.overHour;base+=extra;lines.push('Gói '+$('hourPackage').value+' giờ: '+money(p.price));lines.push('Vượt: '+overKm+'km, '+overHours.toFixed(1)+' giờ = '+money(extra))}if(state.trip==='daily'){let d=Number($('dayPackage').value),p=cfg.daily[d];base=p.price;hours=diffHours(start,$('returnTime').value);overKm=Math.max(0,km-p.km);overHours=Math.max(0,hours-p.hours);let extra=overKm*cfg.overKm+overHours*cfg.overHour;base+=extra;lines.push('Gói '+d+' ngày: '+money(p.price));lines.push('Miễn phí: '+p.hours+' giờ / '+p.km+'km');lines.push('Vượt: '+overKm+'km, '+overHours.toFixed(1)+' giờ = '+money(extra))}let surcharge=0;if(isNight(start)){surcharge+=base*cfg.nightPct;lines.push('Phụ phí đêm +20%: '+money(base*cfg.nightPct))}if($('holiday').value==='yes'){surcharge+=base*cfg.holidayPct;lines.push('Ngày lễ +30%: '+money(base*cfg.holidayPct))}let fees=num('toll')+num('parking')+num('otherFee'),discount=num('discount'),deposit=num('deposit'),total=Math.max(0,base+surcharge+fees-discount),remain=Math.max(0,total-deposit);lines.push('Cao tốc/bãi xe/phí khác: '+money(fees));if(discount)lines.push('Giảm giá: -'+money(discount));if(deposit)lines.push('Đặt cọc: '+money(deposit)+' · Còn lại: '+money(remain));state.last={total,remain,lines,customer:$('customer').value,phone:$('phone').value,from:$('from').value,to:$('to').value,km,start,date:$('date').value};$('totalPrice').textContent=money(total);$('summaryText').textContent='Còn lại: '+money(remain);$('breakdown').textContent=lines.join('\n')+'\n\nTỔNG: '+money(total);return state.last}
function quoteText(){let q=state.last||calculate();return `BÁO GIÁ KANE DRIVER PRO\nKhách: ${q.customer||'Anh/Chị'}\nLộ trình: ${q.from||'Điểm đón'} → ${q.to||'Điểm đến'}\nNgày/giờ: ${q.date||''} ${q.start||''}\nQuãng đường: ${q.km} km\nTổng báo giá: ${money(q.total)}\nCòn lại: ${money(q.remain)}\n\nCảm ơn Anh/Chị đã tin tưởng dịch vụ.`}async function copyZalo(){let text=quoteText();try{await navigator.clipboard.writeText(text);alert('Đã copy nội dung gửi Zalo')}catch(e){prompt('Copy nội dung này:',text)}}function saveQuote(){let q=state.last||calculate();let arr=JSON.parse(localStorage.kaneQuotes||'[]');arr.unshift({...q,created:new Date().toLocaleString('vi-VN')});localStorage.kaneQuotes=JSON.stringify(arr.slice(0,50));loadHistory();alert('Đã lưu báo giá')}function loadHistory(){let arr=JSON.parse(localStorage.kaneQuotes||'[]');$('history').innerHTML=arr.length?arr.map(x=>`<div class="pill">${x.created} · ${x.customer||'Khách'} · ${money(x.total)}</div>`).join(''):'Chưa có báo giá nào.'}function clearHistory(){localStorage.removeItem('kaneQuotes');loadHistory()}render();loadHistory();calculate();
</script>
</body>
</html>
