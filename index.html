<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <title>Kane Driver PRO Single File</title>
  <style>

:root{--bg:#07111f;--card:#101b2e;--line:#30435f;--text:#f8fafc;--muted:#9fb0ca;--gold:#f6ca45;--green:#16a34a;--red:#ef4444}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#061021,#0a1323);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding-bottom:92px}
.app{max-width:540px;margin:auto;padding:12px}
.hero{border:1px solid #3a4c67;border-radius:24px;background:linear-gradient(135deg,#2b3139,#111827);padding:12px;position:sticky;top:6px;z-index:3;box-shadow:0 10px 28px rgba(0,0,0,.25)}
.brand{display:flex;gap:10px;align-items:center}.logo{width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,#ffe27a,#eab308);color:#111827;display:grid;place-items:center;font-weight:950;font-size:23px}
h1{font-size:22px;margin:0}.sub{margin-top:3px;color:#f7d978;font-size:14px}.muted{color:var(--muted)}
.price{font-size:36px;font-weight:950;text-align:right;line-height:1}.total{border-top:1px solid #4a566d;margin-top:8px;padding-top:8px}
.moneyRows{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:8px}.moneyBox{background:#071426;border:1px solid #30435f;border-radius:14px;padding:7px;text-align:center}.moneyBox b{display:block;font-size:14px;margin-top:2px}
.card{background:rgba(16,27,46,.95);border:1px solid var(--line);border-radius:22px;padding:15px;margin-top:12px}.title{font-size:21px;font-weight:900;margin:0 0 11px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}
label{display:block;color:var(--muted);font-size:14px;margin:8px 0 6px}input,select,textarea{width:100%;background:#081225;color:#fff;border:1px solid #2c3e59;border-radius:15px;padding:13px;font-size:16px;outline:0}
.quick{display:flex;gap:8px;overflow:auto;padding-bottom:3px}.quick button{white-space:nowrap;background:#0b1629;border:1px solid #31445f;color:#fff;border-radius:999px;padding:10px 12px;font-weight:850}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:9px}.tab,.btn{border:1px solid #354762;background:#0b1629;color:#fff;border-radius:16px;padding:12px 8px;font-weight:850;font-size:15px}.tab.active,.btn.gold{background:var(--gold);color:#111827;border-color:var(--gold)}
.bottomNav{position:fixed;left:0;right:0;bottom:0;background:#050b14e6;backdrop-filter:blur(14px);border-top:1px solid #263955;padding:8px 8px 12px;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;z-index:10}
.bottomNav button{border:0;background:transparent;color:#9fb0ca;border-radius:16px;padding:8px 2px;font-weight:850;font-size:12px}.bottomNav button.active{background:#102646;color:#fff}.bottomNav span{display:block;font-size:21px;margin-bottom:2px}
.dashGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.dashBox{background:#081225;border:1px solid #263955;border-radius:16px;padding:12px}.dashBox b{font-size:21px;display:block;margin-top:5px}
.invoice{background:#071426;border:1px solid #3a5f92;border-radius:22px;overflow:hidden}.line{display:flex;justify-content:space-between;gap:12px;padding:11px 14px;border-top:1px solid #20314b}.totalLine{background:#102646}
.tripCard,.customerCard{background:#081225;border:1px solid #2c3e59;border-radius:18px;padding:13px;margin:9px 0}
.actionBar{display:flex;gap:8px;margin-top:12px}.actionBar button{border:0;border-radius:14px;padding:14px 9px;font-size:14px;font-weight:950;flex:1}.calc{background:var(--gold);color:#111827}.copy{background:var(--green);color:#fff}.save{background:#243858;color:#fff}

  </style>
</head>
<body>
  <div id="app"></div>
  <nav class="bottomNav">
    <button class="active" data-page="dashboard"><span>🏠</span>Trang chủ</button>
    <button data-page="quote"><span>➕</span>Báo giá</button>
    <button data-page="history"><span>🕘</span>Lịch sử</button>
    <button data-page="customers"><span>👥</span>Khách</button>
    <button data-page="settings"><span>⚙️</span>Cài đặt</button>
  </nav>
  <script>

const state = {
  page: 'dashboard',
  quote: {
    service: 'city',
    from: 'Lê Thành Tân Tạo',
    to: '',
    km: 16,
    total: 0,
    deposit: 0,
    remain: 0
  }
};

function setPage(page){ state.page = page; }
function money(value){ return Math.round(Number(value || 0)).toLocaleString('vi-VN') + 'đ'; }
function getList(key){ try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; } }
function setList(key, list){ localStorage.setItem(key, JSON.stringify(list)); }

const defaultPricing = { minCity:300000, cityKm:12000, provinceKm:12000, waitHour:100000, nightPct:0.2, holidayPct:0.3 };
function calculateQuote(q, pricing = defaultPricing){
  const km = Number(q.km || 0);
  let base = 0;
  if(q.service === 'city' || q.service === 'airport'){
    if(km <= 20) base = pricing.minCity;
    else if(km <= 30) base = 350000;
    else if(km <= 40) base = 450000;
    else if(km <= 50) base = 550000;
    else base = 550000 + (km - 50) * pricing.cityKm;
  }
  if(q.service === 'province') base = km * pricing.provinceKm;
  if(q.service === 'rent') base = Math.max(800000, km * 10000);
  const total = Math.max(0, base);
  const deposit = Number(q.deposit || 0);
  return {...q,total,deposit,remain:Math.max(0,total-deposit),items:[['Tiền xe',base],['Đã cọc',deposit],['Còn lại',Math.max(0,total-deposit)]]};
}

function renderLayout(content){
  const q = state.quote;
  return `<div class="app"><section class="hero"><div class="brand"><div class="logo">KD</div><div><h1>Kane Driver PRO</h1><div class="sub">Single File · Toyota Vios G 2022</div></div></div><div class="total"><div class="muted">TỔNG BÁO GIÁ</div><div class="price">${money(q.total)}</div><div class="moneyRows"><div class="moneyBox"><span class="muted">Đã cọc</span><b>${money(q.deposit)}</b></div><div class="moneyBox"><span class="muted">Còn lại</span><b>${money(q.remain)}</b></div><div class="moneyBox"><span class="muted">Km</span><b>${q.km}</b></div></div></div></section>${content}</div>`;
}

function renderDashboard(){
  const trips=getList('kane.trips'); const customers=getList('kane.customers');
  const revenue=trips.reduce((s,t)=>s+Number(t.total||0),0); const debt=trips.reduce((s,t)=>s+Number(t.remain||0),0);
  return `<section class="card"><div class="title">📊 Dashboard</div><div class="dashGrid"><div class="dashBox"><span class="muted">Doanh thu</span><b>${money(revenue)}</b></div><div class="dashBox"><span class="muted">Công nợ</span><b>${money(debt)}</b></div><div class="dashBox"><span class="muted">Số chuyến</span><b>${trips.length}</b></div><div class="dashBox"><span class="muted">Khách</span><b>${customers.length}</b></div></div></section><section class="card"><div class="title">⚡ Báo giá nhanh</div><div class="quick"><button data-preset="airport">✈️ Sân bay</button><button data-preset="vungtau">🌊 Vũng Tàu</button><button data-preset="longan">🏭 Long An</button><button data-preset="restaurant">🍽 Tiệc</button></div></section>`;
}

function renderQuote(){
  const q = calculateQuote(state.quote); state.quote=q;
  const rows=(q.items||[]).map(i=>`<div class="line"><span>${i[0]}</span><b>${money(i[1])}</b></div>`).join('');
  return `<section class="card"><div class="title">🚗 Báo giá</div><div class="tabs"><button class="tab ${q.service==='city'?'active':''}" data-service="city">Nội thành</button><button class="tab ${q.service==='airport'?'active':''}" data-service="airport">Sân bay</button><button class="tab ${q.service==='province'?'active':''}" data-service="province">Liên tỉnh</button><button class="tab ${q.service==='rent'?'active':''}" data-service="rent">Bao xe</button></div><div class="grid"><div class="full"><label>Điểm đón</label><input id="from" value="${q.from||''}"></div><div class="full"><label>Điểm đến</label><input id="to" value="${q.to||''}"></div><div><label>Km</label><input id="km" type="number" value="${q.km||0}"></div><div><label>Đặt cọc</label><input id="deposit" type="number" value="${q.deposit||0}"></div></div><div class="actionBar"><button class="calc" id="calcBtn">Báo giá</button><button class="save" id="saveBtn">Lưu chuyến</button></div></section><section class="card"><div class="title">🧾 Hóa đơn</div><div class="invoice">${rows}<div class="line totalLine"><span>Tổng</span><b>${money(q.total)}</b></div></div></section>`;
}
renderQuote.afterRender=function(){
  document.querySelectorAll('[data-service]').forEach(btn=>{btn.onclick=()=>{state.quote.service=btn.dataset.service; render();};});
  ['from','to','km','deposit'].forEach(id=>{const el=document.querySelector('#'+id); if(el) el.onchange=e=>{state.quote[id]=e.target.value; if(id==='km'||id==='deposit') state.quote[id]=Number(e.target.value||0); state.quote=calculateQuote(state.quote); render();};});
  const saveBtn=document.querySelector('#saveBtn'); if(saveBtn) saveBtn.onclick=()=>{const trips=getList('kane.trips'); const trip={...state.quote,id:Date.now(),createdAt:new Date().toLocaleString('vi-VN')}; trips.unshift(trip); setList('kane.trips',trips); alert('Đã lưu chuyến.');};
};

function renderHistory(){
  const trips=getList('kane.trips'); if(!trips.length) return `<section class="card"><div class="title">🕘 Lịch sử</div><p class="muted">Chưa có chuyến nào.</p></section>`;
  const cards=trips.map(t=>`<div class="tripCard"><b>${t.customer||'Khách'}</b><br><span class="muted">${t.createdAt||''}</span><br>${t.from||''}<br>↓<br>${t.to||''}<br><b>${money(t.total)}</b> · Còn ${money(t.remain)}<div class="actionBar"><button class="save" data-clone="${t.id}">Nhân bản</button><button class="calc" data-delete="${t.id}">Xóa</button></div></div>`).join('');
  return `<section class="card"><div class="title">🕘 Lịch sử</div>${cards}</section>`;
}
renderHistory.afterRender=function(){document.querySelectorAll('[data-delete]').forEach(btn=>{btn.onclick=()=>{if(!confirm('Xóa chuyến này?'))return; const id=Number(btn.dataset.delete); setList('kane.trips',getList('kane.trips').filter(t=>t.id!==id)); render();};});};

function renderCustomers(){
  const trips=getList('kane.trips'); const map={};
  trips.forEach(t=>{const key=t.phone||t.customer||'Khách lẻ'; if(!map[key]) map[key]={name:key,trips:0,revenue:0,debt:0}; map[key].trips++; map[key].revenue+=Number(t.total||0); map[key].debt+=Number(t.remain||0);});
  const html=Object.values(map).map(c=>`<div class="customerCard"><b>${c.revenue>=10000000?'⭐ ':''}${c.name}</b><br><span class="muted">${c.trips} chuyến · ${money(c.revenue)} · Nợ ${money(c.debt)}</span></div>`).join('');
  return `<section class="card"><div class="title">👥 Khách hàng</div>${html||'<p class="muted">Chưa có khách.</p>'}</section>`;
}
function renderSettings(){return `<section class="card"><div class="title">⚙️ Cài đặt</div><p class="muted">Bản Single File chỉ cần 1 file index.html, phù hợp upload GitHub bằng iPhone.</p></section><section class="card"><div class="title">📁 Triển khai</div><p class="muted">Upload duy nhất file index.html lên GitHub Pages.</p></section>`;}

const app=document.querySelector('#app');
function render(){const pages={dashboard:renderDashboard,quote:renderQuote,history:renderHistory,customers:renderCustomers,settings:renderSettings}; app.innerHTML=renderLayout(pages[state.page]()); pages[state.page].afterRender?.();}
document.querySelectorAll('.bottomNav button').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.bottomNav button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); setPage(btn.dataset.page); render();});});
window.KaneRender=render; render();

  </script>
</body>
</html>
